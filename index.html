<!DOCTYPE html>
<html>
<head>
    <title>Spark AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        .features {
            padding: 50px 20px;
        }

        .box {
            background: #1e293b;
            margin: 15px auto;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
        }

        footer {
            padding: 20px;
            background: #020617;
        }
    </style>
</head>
<body>

<header>
    <h1>🤖 Spark AI</h1>
    <p>The Future of Artificial Intelligence</p>
    <a href="#features" class="btn">Get Started</a>
</header>

<section id="features" class="features">
    <h2>Our Features</h2>

    <div class="box">
        <h3>AI Chat</h3>
        <p>Ask questions and get smart answers.</p>
    </div>

    <div class="box">
        <h3>AI Images</h3>
        <p>Create amazing AI-generated pictures.</p>
    </div>

    <div class="box">
        <h3>AI Learning</h3>
        <p>Learn faster with AI-powered tools.</p>
    </div>
</section>

<footer>
    <p>© 2026 Spark AI</p>
</footer>

</body>
</html>
